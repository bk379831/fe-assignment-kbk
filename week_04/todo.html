<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <link rel="stylesheet" href="todo.css" />
</head>

<body>
  <main class="todo">
    <h1 class="todo__title">TO DO LIST</h1>

    <section class="todo__form">
      <input
        id="todoInput"
        class="todo__input"
        type="text"
        placeholder="할 일을 입력하세요..."
      />
      <button id="addBtn" class="todo__add-button">+ 추가</button>
    </section>

    <ul id="todoList" class="todo__list"></ul>
  </main>

  <script src="todo.js"></script>
</body>
</html>
