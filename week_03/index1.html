<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-100 flex items-center justify-center p-6">
  <main class="profile-card w-full max-w-sm bg-white rounded-2xl shadow-xl p-6 text-center transition duration-300 hover:-translate-y-2 hover:shadow-2xl">
    
    <!-- 프로필 이미지 영역 -->
    <div class="profile-card__image mx-auto w-28 h-28 rounded-full bg-gradient-to-br from-blue-500 to-purple-500 flex items-center justify-center text-white text-4xl font-bold shadow-md">
      KB
    </div>

    <!-- 텍스트 영역 -->
    <section class="profile-card__content mt-5">
      <h1 class="profile-card__name text-2xl font-bold text-slate-800">
        김보경
      </h1>

      <p class="profile-card__intro mt-2 text-slate-600">
        사용자에게 가치를 전달하는 개발자가 되고 싶은 컴퓨터공학 전공 학생입니다.
      </p>
    </section>

    <!-- 기술 태그 영역 -->
    <section class="profile-card__tags mt-5 grid grid-cols-3 gap-2">
      <span class="profile-card__tag bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-medium">
        HTML
      </span>
      <span class="profile-card__tag bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-medium">
        CSS
      </span>
      <span class="profile-card__tag bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-sm font-medium">
        Tailwind
      </span>
    </section>

    <!-- 버튼 영역 -->
    <section class="profile-card__buttons mt-6 flex gap-3">
      <a 
        href="https://github.com/bk379831"
        target="_blank"
        class="profile-card__button profile-card__button--github flex-1 bg-blue-500 text-white py-2 rounded-xl transition duration-300 hover:bg-blue-600 hover:scale-105 hover:-translate-y-0.2 hover:shadow-lg"
      >
        GitHub
      </a>

      <a 
        href="#"
        class="profile-card__button profile-card__button--blog flex-1 border border-slate-300 text-slate-700 py-2 rounded-xl transition duration-300 hover:bg-slate-100 hover:scale-105 hover:-translate-y-0.2 hover:shadow-lg"
      >
        Blog
      </a>
    </section>

  </main>
</body>
</html>
